# Build spec for both x86 and arm builds
version: 0.2

phases:
  install:
    commands:
      - yum -y install valgrind clang cmake3 ninja-build perl golang || (apt-get --allow-insecure-repositories update && apt-get -y install valgrind clang cmake ninja-build perl golang)
  build:
    commands:
      - cd ${CODEBUILD_SRC_DIR}/${S2N_BIGNUM_ARCH}
      - make
      - if [ ${S2N_BUILD_ARCH} == "x86" ]; then
        cd ${CODEBUILD_SRC_DIR}/x86_att && make clobber && make && git diff --exit-code . ;
        fi
      - cd ${CODEBUILD_SRC_DIR}/tests
      - CC=gcc make complete
      - CC=clang make complete
      - make ctCheck
      - cd ${CODEBUILD_SRC_DIR}/benchmarks
      - CC=gcc make
      - CC=clang make
      # AWS-LC test
      - cd ${CODEBUILD_SRC_DIR}
      - git clone https://github.com/aws/aws-lc.git --depth=1
      - cd aws-lc/third_party/s2n-bignum
      - rm -rf ./s2n-bignum-imported
      - GITHUB_REPOSITORY=${CODEBUILD_RUNNER_OWNER}/${CODEBUILD_RUNNER_REPO} GITHUB_TARGET=${CODEBUILD_SOURCE_VERSION} ./import.sh
      - cd ../..
      - mkdir aws-lc-build && cd aws-lc-build
      - cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo ../aws-lc
      - ninja-build run_tests
