name: CI

on:
  pull_request:
    branches: [ main ]

env:
  HOLLIGHT_COMMIT: "af5d20e033025a9f30a490d9c39edace632405a3"

jobs:
  s2n-bignum-tests:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install valgrind

    - name: Run tests
      run: |
        cd ${{ matrix.arch }}
        make
        ${{ matrix.arch == 'x86' && 'cd ../x86_att && make clobber && make && git diff --exit-code .' || true}}
        echo "Make test"
        cd ../tests
        CC=gcc make complete
        make ctCheck
        echo "Make test with valgrind"
        make clean
        CC=gcc VALGRIND="valgrind --" make complete || echo "(incomplete test, but proceeding)"
        echo "Make test (clang, build only)"
        make clean
        CC=clang make
        echo "Make benchmark (build only, for both of those)"
        cd ../benchmarks
        CC=gcc make
        make clean
        CC=clang make

  s2n-bignum-aws-lc-integration:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install valgrind cmake golang ninja-build
        which ninja
        sudo ln -s /usr/bin/ninja /usr/bin/ninja-build
        which cmake
        ln -s /usr/local/bin/cmake /usr/local/bin/cmake3

    - name: Run tests
      run: |
        echo "Run AWS-LC integration test (GITHUB_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}, GITHUB_TARGET: $GITHUB_HEAD_REF)"
        git clone https://github.com/aws/aws-lc.git --depth=1
        cd aws-lc/third_party/s2n-bignum
        rm -rf ./s2n-bignum-imported
        GITHUB_REPOSITORY=${{ github.event.pull_request.head.repo.full_name }}.git GITHUB_TARGET=$GITHUB_HEAD_REF ./import.sh
        cd ../../../
        mkdir aws-lc-build && cd aws-lc-build
        cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFIPS=On ../aws-lc
        ninja-build run_tests
        cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFIPS=Off -DBUILD_SHARED_LIBS=1 ../aws-lc
        ninja-build run_tests
        cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFIPS=Off ../aws-lc
        ninja-build run_tests

  s2n-bignum-sematest:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install libpcre2-dev ocaml libstring-shellquote-perl libgmp-dev xdot
        wget https://raw.githubusercontent.com/ocaml/opam/master/shell/install.sh
        chmod +x install.sh
        echo "/usr/local/bin" | sh ./install.sh
        opam init --disable-sandboxing

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run tests
      run: |
        export HOLDIR=`pwd`/hol-light
        cd ${{ matrix.arch }}
        make sematest

  s2n-bignum-tutorial:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install libpcre2-dev ocaml libstring-shellquote-perl libgmp-dev xdot
        wget https://raw.githubusercontent.com/ocaml/opam/master/shell/install.sh
        chmod +x install.sh
        echo "/usr/local/bin" | sh ./install.sh
        opam init --disable-sandboxing

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run tutorial
      run: |
        export HOLDIR=`pwd`/hol-light
        cd ${{ matrix.arch }}
        make tutorial -j2

  s2n-bignum-tutorial-macos-arm:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        brew install opam
        opam init -a

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run tutorial
      run: |
        export HOLDIR=`pwd`/hol-light
        cd arm
        make tutorial -j2

  s2n-bignum-proofs:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            subdir: aes-xts
          - arch: arm
            subdir: curve25519
          - arch: arm
            subdir: fastmul
          - arch: arm
            subdir: generic
          - arch: arm
            subdir: mldsa
          - arch: arm
            subdir: mlkem
          - arch: arm
            subdir: p256
          - arch: arm
            subdir: p384
          - arch: arm
            subdir: p521
          - arch: arm
            subdir: secp256k1
          - arch: arm
            subdir: sha3
          - arch: arm
            subdir: sm2
          - arch: x86
            subdir: curve25519
          - arch: x86
            subdir: fastmul
          - arch: x86
            subdir: generic
          - arch: x86
            subdir: mldsa
          - arch: x86
            subdir: mlkem
          - arch: x86
            subdir: p256
          - arch: x86
            subdir: p384
          - arch: x86
            subdir: p521
          - arch: x86
            subdir: secp256k1
          - arch: x86
            subdir: sha3
          - arch: x86
            subdir: sm2
    runs-on:
      - codebuild-s2n-bignum-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
    name: ${{ matrix.arch }} ${{ matrix.subdir }} proofs

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt --allow-insecure-repositories update
        sudo apt -y install libpcre2-dev ocaml binutils-aarch64-linux-gnu binutils-aarch64-linux-gnu binutils-x86-64-linux-gnu libstring-shellquote-perl libgmp-dev xdot
        wget https://raw.githubusercontent.com/ocaml/opam/master/shell/install.sh
        chmod +x install.sh
        echo "/usr/local/bin" | sh ./install.sh
        opam init --disable-sandboxing

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run proofs for ${{ matrix.arch }}/${{ matrix.subdir }}
      run: |
        export HOLDIR=`pwd`/hol-light
        export BUILD_CORE_COUNT=15
        export CORE_COUNT=64
        cd ${{ matrix.arch }}
        # Build the .native binaries for the proofs in this subdirectory.
        # build_proofs depends on UNOPT_OBJ, so the .o files for THIS subdir
        # also get assembled. We rely on the per-target Makefile rules
        # rather than the `proofs` aggregate to scope to just this subdir.
        targets=$(ls ${{ matrix.subdir }}/*.S | sed 's/\.S$/.correct/')
        make -j ${BUILD_CORE_COUNT} $(echo "$targets" | sed 's/\.correct$/.native/')
        make -j ${CORE_COUNT} $targets


