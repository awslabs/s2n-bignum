name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: read

env:
  HOLLIGHT_COMMIT: "af5d20e033025a9f30a490d9c39edace632405a3"

jobs:
  s2n-bignum-tests:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install valgrind

    - name: Run tests
      run: |
        cd ${{ matrix.arch }}
        make
        ${{ matrix.arch == 'x86' && 'cd ../x86_att && make clobber && make && git diff --exit-code .' || true}}
        echo "Make test"
        cd ../tests
        CC=gcc make complete
        make ctCheck
        echo "Make test with valgrind"
        make clean
        CC=gcc VALGRIND="valgrind --" make complete || echo "(incomplete test, but proceeding)"
        echo "Make test (clang, build only)"
        make clean
        CC=clang make
        echo "Make benchmark (build only, for both of those)"
        cd ../benchmarks
        CC=gcc make
        make clean
        CC=clang make

  s2n-bignum-aws-lc-integration:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install valgrind cmake golang ninja-build
        which ninja
        sudo ln -s /usr/bin/ninja /usr/bin/ninja-build
        which cmake
        ln -s /usr/local/bin/cmake /usr/local/bin/cmake3

    - name: Run tests
      run: |
        echo "Run AWS-LC integration test (GITHUB_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}, GITHUB_TARGET: $GITHUB_HEAD_REF)"
        git clone https://github.com/aws/aws-lc.git --depth=1
        cd aws-lc/third_party/s2n-bignum
        rm -rf ./s2n-bignum-imported
        GITHUB_REPOSITORY=${{ github.event.pull_request.head.repo.full_name }}.git GITHUB_TARGET=$GITHUB_HEAD_REF ./import.sh
        cd ../../../
        mkdir aws-lc-build && cd aws-lc-build
        cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFIPS=On ../aws-lc
        ninja-build run_tests
        cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFIPS=Off -DBUILD_SHARED_LIBS=1 ../aws-lc
        ninja-build run_tests
        cmake3 -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFIPS=Off ../aws-lc
        ninja-build run_tests

  s2n-bignum-sematest:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install libpcre2-dev ocaml libstring-shellquote-perl libgmp-dev xdot
        wget https://raw.githubusercontent.com/ocaml/opam/master/shell/install.sh
        chmod +x install.sh
        echo "/usr/local/bin" | sh ./install.sh
        opam init --disable-sandboxing

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run tests
      run: |
        export HOLDIR=`pwd`/hol-light
        cd ${{ matrix.arch }}
        make sematest

  s2n-bignum-tutorial:
    strategy:
      matrix:
        arch: [arm, x86]

    runs-on: ${{ matrix.arch == 'arm' && 'ubuntu-24.04-arm' || matrix.arch == 'x86' && 'ubuntu-24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        sudo apt update
        sudo apt install libpcre2-dev ocaml libstring-shellquote-perl libgmp-dev xdot
        wget https://raw.githubusercontent.com/ocaml/opam/master/shell/install.sh
        chmod +x install.sh
        echo "/usr/local/bin" | sh ./install.sh
        opam init --disable-sandboxing

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run tutorial
      run: |
        export HOLDIR=`pwd`/hol-light
        cd ${{ matrix.arch }}
        make tutorial -j2

  s2n-bignum-tutorial-macos-arm:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependent packages
      run: |
        brew install opam
        opam init -a

    - name: Install HOL Light
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        echo $(ocamlc -version)
        echo $(camlp5 -v)
        HOLLIGHT_USE_MODULE=1 make
        cd ..

    - name: Run tutorial
      run: |
        export HOLDIR=`pwd`/hol-light
        cd arm
        make tutorial -j2

  # Stage 1: compute the per-proof matrix and the list of changed files.
  # Cheap job (just python + git diff).
  s2n-bignum-proofs-matrix:
    runs-on: ubuntu-24.04
    outputs:
      proofs: ${{ steps.gen.outputs.proofs }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Generate per-proof matrix
      id: gen
      run: |
        python3 tools/list-proofs.py > all-proofs.json
        python3 tools/compute-proof-deps.py > proof-deps.json
        # changed-files: empty => "everything affected"
        if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > changed-files.txt
        else
          : > changed-files.txt
        fi
        # Filter all-proofs.json by dep set intersection with changed-files
        python3 tools/filter-affected.py \
          all-proofs.json proof-deps.json changed-files.txt > affected.json
        # Emit the matrix as a JSON array on a single line
        echo "proofs=$(cat affected.json)" >> "$GITHUB_OUTPUT"
        echo "Affected proofs: $(jq 'length' affected.json) of $(jq 'length' all-proofs.json)"

  # Stage 2: one matrix entry per affected proof. If nothing is affected,
  # this job's matrix is empty and the job becomes a no-op.
  s2n-bignum-proofs:
    needs: s2n-bignum-proofs-matrix
    if: needs.s2n-bignum-proofs-matrix.outputs.proofs != '[]'
    strategy:
      fail-fast: false
      matrix:
        proof: ${{ fromJSON(needs.s2n-bignum-proofs-matrix.outputs.proofs) }}
    runs-on:
      - codebuild-s2n-bignum-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
    name: ${{ matrix.proof.arch }} ${{ matrix.proof.subdir }}/${{ matrix.proof.name }}

    steps:
    - uses: actions/checkout@v4

    - name: Cache HOL Light build
      id: cache-hol
      uses: actions/cache@v4
      with:
        path: hol-light
        key: hol-light-${{ env.HOLLIGHT_COMMIT }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install dependent packages
      run: |
        sudo apt --allow-insecure-repositories update
        sudo apt -y install libpcre2-dev ocaml binutils-aarch64-linux-gnu binutils-aarch64-linux-gnu binutils-x86-64-linux-gnu libstring-shellquote-perl libgmp-dev xdot
        wget https://raw.githubusercontent.com/ocaml/opam/master/shell/install.sh
        chmod +x install.sh
        echo "/usr/local/bin" | sh ./install.sh
        opam init --disable-sandboxing

    - name: Build HOL Light (cache miss)
      if: steps.cache-hol.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/jrh13/hol-light.git
        cd hol-light
        git checkout ${{ env.HOLLIGHT_COMMIT }}
        make switch-5
        eval $(opam env)
        HOLLIGHT_USE_MODULE=1 make

    - name: Run proof ${{ matrix.proof.arch }}/${{ matrix.proof.subdir }}/${{ matrix.proof.name }}
      env:
        BUILD_CORE_COUNT: 15
      run: |
        export HOLDIR=`pwd`/hol-light
        cd ${{ matrix.proof.arch }}
        target=${{ matrix.proof.subdir }}/${{ matrix.proof.name }}.correct
        make -j ${BUILD_CORE_COUNT} ${target%.correct}.native
        make $target


